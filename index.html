<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RICHMOND | The Selection</title>
    <style>
        body { margin: 0; background-color: #000; color: #d4af37; font-family: 'Times New Roman', serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #ui-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; text-align: center; z-index: 1; }
        .hidden { display: none; }
        button { display: block; width: 100%; margin: 10px 0; padding: 15px; background: #000; color: #d4af37; border: 1px solid #d4af37; cursor: pointer; }
        button:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="start-view">
            <h1 onclick="start()" style="cursor:pointer">RICHMOND</h1>
            <p>IL TIMONE È IL DESTINO.</p>
        </div>
        <div id="game-view" class="hidden">
            <h2 id="q-text"></h2>
            <div id="btn-container"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.150.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        camera.position.z = 5;

        let timone = null;
        new GLTFLoader().load('./timone-mare-aureo.glb', (gltf) => {
            timone = gltf.scene;
            scene.add(timone);
        });

        function animate() {
            requestAnimationFrame(animate);
            if(timone) timone.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.updateColor = (p) => {
            if(!timone) return;
            timone.traverse(c => { if(c.isMesh) c.material.color.setHex(p === 5 ? 0x00ff00 : (p === 1 ? 0xff0000 : 0xd4af37)); });
        };
    </script>

    <script>
        const pool = Array.from({length: 100}, (_, i) => ({t: `Domanda #${i+1}: La tua visione del successo?`, o: {"Base": 1, "Media": 3, "Elite": 5}}));
        let q = [], idx = 0, pTot = 0;

        window.start = () => {
            q = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            renderQ();
        };

        function renderQ() {
            document.getElementById('q-text').innerText = q[idx].t;
            const b = document.getElementById('btn-container');
            b.innerHTML = '';
            Object.entries(q[idx].o).forEach(([k, v]) => {
                const btn = document.createElement('button');
                btn.innerText = k;
                btn.onclick = () => handle(v);
                b.appendChild(btn);
            });
        }

        window.handle = (p) => {
            window.updateColor(p);
            if (idx === 0 && p === 1) { document.getElementById('ui-layer').innerHTML = "<h1>NAUFRAGIO</h1>"; return; }
            pTot += p; idx++;
            idx < 3 ? renderQ() : (document.getElementById('ui-layer').innerHTML = `<h1>VIAGGIO CONCLUSO</h1><p>Risultato: ${pTot}</p>`);
        };
    </script>
</body>
</html>

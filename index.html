<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RICHMOND | The Selection</title>
    <style>
        body { margin: 0; background-color: #050505; color: #d4af37; font-family: 'Times New Roman', serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #main-container { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .symbol { font-size: 4rem; cursor: pointer; margin-bottom: 20px; }
        button { display: block; width: 320px; margin: 8px; padding: 12px; background: rgba(0,0,0,0.8); color: #d4af37; border: 1px solid #d4af37; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="main-container">
        <div class="symbol" onclick="iniziaSelezione()">⚓</div>
        <h1 id="title">RICHMOND</h1>
        <p id="subtitle">IL TIMONE È IL DESTINO.</p>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.0/build/three.module.js';
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        camera.position.z = 5;
        const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0xd4af37 });
        const timone = new THREE.Mesh(geometry, material);
        scene.add(timone);
        function animate() { requestAnimationFrame(animate); timone.rotation.x += 0.005; timone.rotation.y += 0.005; renderer.render(scene, camera); }
        animate();
        window.aggiornaMondo = function(peso) { material.color.setHex(peso === 5 ? 0x00ff00 : (peso === 1 ? 0xff0000 : 0xd4af37)); };
    </script>

    <script>
        const poolDomande = Array.from({length: 100}, (_, i) => ({
            t: `Domanda #${i+1}: La tua visione del successo?`,
            o: {"Base": 1, "Media": 3, "Elite": 5}
        }));

        let estratte = [], indice = 0, punteggio = 0;
        window.iniziaSelezione = () => {
            estratte = poolDomande.sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('main-container').innerHTML = "";
            mostraDomanda();
        }
        function mostraDomanda() {
            const d = estratte[indice];
            let html = `<h2>${d.t}</h2>`;
            for (let k in d.o) html += `<button onclick="gestisciRisposta(${d.o[k]})">${k}</button>`;
            document.getElementById('main-container').innerHTML = html;
        }
        window.gestisciRisposta = (peso) => {
            if (indice === 0 && peso === 1) { document.getElementById('main-container').innerHTML = "<h1>NAUFRAGIO</h1>"; return; }
            punteggio += peso; indice++;
            window.aggiornaMondo(peso);
            if (indice < 3) mostraDomanda();
            else document.getElementById('main-container').innerHTML = `<h1>CONCLUSO</h1><p>Risultato: ${punteggio}</p>`;
        }
    </script>
</body>

<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RICHMOND | The Selection</title>
    <style>
        body { margin: 0; background-color: #050505; color: #d4af37; font-family: 'Times New Roman', serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }

        .symbol { font-size: 4rem; cursor: pointer; margin-bottom: 20px; transition: transform 0.3s; }
        .symbol:hover { transform: scale(1.1); }
        button { display: block; width: 100%; margin: 12px 0; padding: 18px; background: #111; color: #d4af37; border: 1px solid #d4af37; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        button:hover { background: #d4af37; color: #000; }
        h1, h2 { text-transform: uppercase; letter-spacing: 0.2rem; }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="symbol" onclick="iniziaSelezione()">⚓</div>
        <h1 id="title">RICHMOND</h1>
        <p id="subtitle">IL TIMONE È IL DESTINO.</p>
    </div>

    <script>
        const poolDomande = [
            { t: "Cosa rappresenta per te il denaro?", o: {"Mezzo necessario": 1, "Misura di efficacia": 3, "Potere di plasmare la realtà": 5} },
            { t: "Di fronte al rischio, come reagisci?", o: {"Cerco sicurezza": 1, "Valuto e agisco": 3, "Il rischio è il mio elemento": 5} },
            { t: "Cosa provi guardando un'opera d'arte?", o: {"Nulla di particolare": 1, "Apprezzo l'estetica": 3, "Analizzo il valore e la storia": 5} },
            { t: "La solitudine è per te...", o: {"Una paura": 1, "Un momento di pausa": 3, "Il mio stato naturale": 5} },
            { t: "Cosa cerchi nelle relazioni?", o: {"Conferme": 1, "Collaborazione": 3, "Affinità di visione": 5} }
        ];

        let domandeEstratte = [];
        let indice = 0;
        let punteggio = 0;

        function iniziaSelezione() {
            domandeEstratte = poolDomande.sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('main-container').innerHTML = "";
            mostraStep();
        }

        function mostraStep() {
            const d = domandeEstratte[indice];
            let html = `<h2>Fase ${indice + 1}/3</h2><p>${d.t}</p>`;
            for (let k in d.o) html += `<button onclick="rispondi(${d.o[k]})">${k}</button>`;
            document.getElementById('main-container').innerHTML = html;
        }

        function rispondi(peso) {
            if (indice === 0 && peso === 1) {
                document.getElementById('main-container').innerHTML = "<h1>NAUFRAGIO</h1><p>Non hai il piglio del comandante. Sei fuori.</p>";
                return;
            }
            punteggio += peso;
            indice++;
            if (indice < 3) mostraStep();
            else verdetto();
        }

        function verdetto() {
            let msg = (punteggio >= 11) ? "<h1>BENVENUTO A RICHMOND</h1>" : "<h1>ACQUE COMUNI</h1>";
            document.getElementById('main-container').innerHTML = msg + `<p>Risultato finale: ${punteggio}</p>`;
        }
    </script>
</body>
